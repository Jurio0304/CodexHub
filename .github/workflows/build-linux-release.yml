name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub Release tag to use for optional deb asset upload."
        required: true
        default: "v0.4.2"
      upload_to_release:
        description: "Upload Linux deb assets and merged SHA256SUMS.txt to the existing GitHub Release."
        required: true
        type: boolean
        default: false
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "figs/**"
      - ".agents/**"
      - "LICENSE"
      - "SECURITY.md"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "figs/**"
      - ".agents/**"
      - "LICENSE"
      - "SECURITY.md"

jobs:
  linux-release:
    name: Linux ${{ matrix.deb_arch }} deb release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - deb_arch: arm64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libkeyutils-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            TAG="v$VERSION"
          fi
          case "$TAG" in
            v*) ;;
            *) TAG="v$TAG" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Run smoke checks
        run: pnpm smoke

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build:web

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Linux deb release
        run: pnpm build:linux:release

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexhub-linux-v${{ steps.meta.outputs.version }}-${{ matrix.deb_arch }}-deb-release
          path: |
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  linux-release-publish:
    name: Publish Linux deb assets
    needs: linux-release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            TAG="v$VERSION"
          fi
          case "$TAG" in
            v*) ;;
            *) TAG="v$TAG" ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codexhub-linux-v${{ steps.meta.outputs.version }}-*-deb-release
          path: dist-release/v${{ steps.meta.outputs.version }}/linux-deb
          merge-multiple: true

      - name: Download existing checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          mkdir -p dist-release/existing-release
          gh release download "$RELEASE_TAG" --pattern SHA256SUMS.txt --dir dist-release/existing-release || true

      - name: Generate merged Linux deb checksums
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          releaseDir="dist-release/v$VERSION/linux-deb"
          checksumPath="$releaseDir/SHA256SUMS.txt"
          existingPath="dist-release/existing-release/SHA256SUMS.txt"
          mkdir -p "$releaseDir"
          if [ -f "$existingPath" ]; then
            grep -Ev "CodexHub_${VERSION}_(amd64|arm64)\\.deb$|CodexHub_${VERSION}_amd64\\.AppImage$" "$existingPath" > "$checksumPath" || true
          else
            : > "$checksumPath"
          fi
          for arch in amd64 arm64; do
            debPath="$releaseDir/CodexHub_${VERSION}_${arch}.deb"
            if [ ! -f "$debPath" ]; then
              echo "Missing Linux deb asset: $debPath" >&2
              find "$releaseDir" -maxdepth 2 -type f -print >&2
              exit 1
            fi
            sha256sum "$debPath" >> "$checksumPath"
          done
          cat "$checksumPath"

      - name: Upload Linux deb assets to existing GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          releaseDir="dist-release/v$VERSION/linux-deb"
          gh release view "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" --clobber \
            "$releaseDir/CodexHub_${VERSION}_amd64.deb#CodexHub_${VERSION}_amd64.deb" \
            "$releaseDir/CodexHub_${VERSION}_arm64.deb#CodexHub_${VERSION}_arm64.deb" \
            "$releaseDir/SHA256SUMS.txt#SHA256SUMS.txt"

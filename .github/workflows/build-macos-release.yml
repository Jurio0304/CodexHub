name: Build macOS Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  macos-release:
    name: macOS unsigned release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run smoke checks
        run: pnpm smoke

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build:web

      - name: Generate macOS icons
        run: pnpm tauri icon src-tauri/icons/icon.png

      - name: Build unsigned macOS release
        run: |
          echo "Unsigned/ad-hoc macOS release artifact: Apple Developer ID signing and notarization are not configured in this workflow."
          pnpm build:macos:release
        env:
          APPLE_SIGNING_IDENTITY: "-"

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexhub-macos-v${{ steps.meta.outputs.version }}-unsigned-release
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

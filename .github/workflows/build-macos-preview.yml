name: Build macOS Preview

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  macos-preview:
    name: macOS unsigned preview
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke checks
        run: pnpm smoke

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build:web

      - name: Generate macOS icons
        run: pnpm tauri icon src-tauri/icons/icon.png

      - name: Build unsigned macOS preview
        run: |
          echo "Unsigned/ad-hoc preview build: Apple Developer ID signing and notarization are intentionally not configured yet."
          pnpm tauri build --bundles app,dmg --ci
        env:
          APPLE_SIGNING_IDENTITY: "-"

      - name: Upload macOS preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexhub-macos-unsigned-preview
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

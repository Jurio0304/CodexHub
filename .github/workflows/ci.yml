name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "figs/**"
      - ".agents/**"
      - "LICENSE"
      - "SECURITY.md"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "figs/**"
      - ".agents/**"
      - "LICENSE"
      - "SECURITY.md"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-validation:
    name: Source validation
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libkeyutils-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke checks
        run: pnpm smoke

      - name: Run mock smoke checks
        run: pnpm smoke:mock

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build:web

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
